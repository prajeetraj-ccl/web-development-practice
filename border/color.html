<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color</title>
    <style>
    p.one {
  border-style: solid;
  border-color: red; /* red */
}

p.two {
  border-style: solid;
  border-color: blue; /* blue */
}

p.three {
  border-style: solid;
  border-color: gray; /* grey */
}
</style>
</head>
<body>
    <p class="one">A solid red border</p>
   <p class="two">A solid blue border</p>
   <p class="three">A solid grey border</p>
</body>
</html>
